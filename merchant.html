<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>QUI — Profilo Merchant</title>
<link rel="icon" type="image/png" href="https://github.com/panacea-cloud/-ilqui-assets/blob/main/ilqui_logo.png?raw=true"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet"/>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { font-family: 'Inter', sans-serif; font-size: 13px; color: #111; background: #f5f5f7; min-height: 100%; }

.topbar {
  height: 44px; background: #fff; border-bottom: 0.5px solid #e0e0e0;
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 20px; position: sticky; top: 0; z-index: 100;
}
.topbar-logo { width: 28px; height: 28px; object-fit: contain; }
.topbar-back {
  font-size: 12px; font-weight: 500; color: #2a2a6e; cursor: pointer;
  background: none; border: none; font-family: inherit; display: flex; align-items: center; gap: 4px;
}
.topbar-back:hover { opacity: 0.7; }

.page { max-width: 560px; margin: 0 auto; padding: 24px 16px 60px; display: flex; flex-direction: column; gap: 16px; }

/* hero */
.hero {
  background: #2a2a6e; border-radius: 16px; padding: 28px 24px;
  display: flex; align-items: center; gap: 20px;
}
.hero-photo {
  width: 72px; height: 72px; border-radius: 50%; object-fit: cover;
  border: 2.5px solid rgba(255,255,255,0.4); flex-shrink: 0; cursor: pointer;
}
.hero-photo-placeholder {
  width: 72px; height: 72px; border-radius: 50%; background: rgba(255,255,255,0.15);
  display: flex; align-items: center; justify-content: center; font-size: 28px;
  flex-shrink: 0; cursor: pointer; border: 2px dashed rgba(255,255,255,0.3);
}
.hero-info { flex: 1; min-width: 0; }
.hero-name { font-size: 17px; font-weight: 600; color: #fff; margin-bottom: 4px; }
.hero-email { font-size: 12px; color: rgba(255,255,255,0.6); margin-bottom: 6px; }
.hero-badge {
  display: inline-flex; align-items: center; gap: 4px;
  background: rgba(255,255,255,0.15); border-radius: 20px;
  padding: 3px 10px; font-size: 11px; color: #fff; font-weight: 500;
}

/* card */
.card {
  background: #fff; border-radius: 14px; overflow: hidden;
  border: 0.5px solid #e8e8e8;
}
.card-header {
  padding: 12px 16px; border-bottom: 0.5px solid #f0f0f0;
  font-size: 11px; font-weight: 600; color: #2a2a6e;
  display: flex; align-items: center; gap: 6px; background: #f8f8fc;
}
.card-body { padding: 16px; display: flex; flex-direction: column; gap: 12px; }

.field { display: flex; flex-direction: column; gap: 5px; }
.field label { font-size: 10px; font-weight: 600; color: #888; letter-spacing: .04em; text-transform: uppercase; }
.field input, .field textarea {
  border: 1px solid #e0e0e0; border-radius: 8px; padding: 9px 11px;
  font-size: 13px; font-family: inherit; color: #111; outline: none;
  background: #fafafa; width: 100%; transition: border-color .15s;
}
.field input:focus, .field textarea:focus { border-color: #2a2a6e; background: #fff; }
.field textarea { resize: vertical; min-height: 80px; }

.save-btn {
  padding: 10px 18px; background: #2a2a6e; color: #fff; border: none;
  border-radius: 8px; font-size: 12px; font-weight: 600; cursor: pointer;
  font-family: inherit; align-self: flex-end;
}
.save-btn:hover { opacity: .88; }
.save-btn:disabled { opacity: .45; cursor: not-allowed; }

/* doc rows */
.doc-row {
  display: flex; align-items: center; justify-content: space-between;
  padding: 10px 12px; border: 0.5px solid #e0e0e0; border-radius: 8px; gap: 8px;
}
.doc-label { font-size: 12px; color: #555; font-weight: 500; flex: 1; }
.doc-status { font-size: 11px; color: #aaa; }
.doc-status.uploaded { color: #2a7a4a; font-weight: 600; }
.doc-btn {
  font-size: 11px; background: #f0f0fa; color: #2a2a6e; border: 0.5px solid #c0c0e0;
  border-radius: 6px; padding: 5px 10px; cursor: pointer; font-family: inherit;
  font-weight: 500; white-space: nowrap;
}
.doc-btn:hover { background: #e0e0f5; }
.verified-badge {
  display: flex; align-items: center; gap: 6px; padding: 10px 12px;
  background: #ddf3ea; border-radius: 8px; font-size: 12px; color: #2a7a4a; font-weight: 600;
}

/* listing card */
.listing-card {
  border: 0.5px solid #e0e0e0; border-radius: 10px; padding: 12px;
  display: flex; align-items: center; justify-content: space-between; gap: 10px;
}
.listing-card-info { flex: 1; min-width: 0; }
.listing-card-title { font-size: 13px; font-weight: 500; color: #111; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.listing-card-meta { font-size: 11px; color: #888; margin-top: 2px; }
.listing-card-expires { font-size: 10px; color: #e07030; font-weight: 500; margin-top: 2px; }
.delete-btn {
  font-size: 11px; color: #c0392b; background: #fdf0f0; border: 0.5px solid #f5c0b8;
  border-radius: 6px; padding: 5px 10px; cursor: pointer; font-family: inherit;
  font-weight: 500; white-space: nowrap; flex-shrink: 0;
}
.delete-btn:hover { background: #fbe0e0; }

.empty { font-size: 12px; color: #aaa; text-align: center; padding: 20px 0; }
.spinner { width: 20px; height: 20px; border: 2px solid #eee; border-top-color: #2a2a6e; border-radius: 50%; animation: spin .7s linear infinite; margin: 0 auto; }
@keyframes spin { to { transform: rotate(360deg); } }

  /* api keys */
.apikey-row {
  display: flex; align-items: center; justify-content: space-between;
  padding: 10px 12px; border: 0.5px solid #e0e0e0; border-radius: 8px; gap: 8px;
}
.apikey-prefix { font-size: 12px; font-weight: 600; color: #111; font-family: monospace; }
.apikey-meta { font-size: 11px; color: #888; margin-top: 2px; }
.apikey-revoke-btn {
  font-size: 11px; color: #c0392b; background: #fdf0f0; border: 0.5px solid #f5c0b8;
  border-radius: 6px; padding: 5px 10px; cursor: pointer; font-family: inherit;
  font-weight: 500; white-space: nowrap; flex-shrink: 0;
}
.apikey-revoke-btn:hover { background: #fbe0e0; }
.apikey-new-box {
  background: #f0f2ff; border: 1px solid #c0c0e0; border-radius: 10px;
  padding: 14px; display: flex; flex-direction: column; gap: 10px;
}
.apikey-new-box input {
  border: 1px solid #c0c0e0; border-radius: 8px; padding: 8px 10px;
  font-size: 12px; font-family: inherit; color: #111; outline: none;
  background: #fff; width: 100%;
}
.apikey-new-box input:focus { border-color: #2a2a6e; }
.apikey-secret-box {
  background: #fff8e1; border: 1px solid #ffe082; border-radius: 8px;
  padding: 12px; display: flex; flex-direction: column; gap: 8px;
}
.apikey-secret-value {
  font-family: monospace; font-size: 11px; color: #111;
  word-break: break-all; line-height: 1.5;
}
.apikey-warning { font-size: 11px; color: #e07030; font-weight: 600; }
.logout-btn {
  width: 100%; padding: 11px; border: 1px solid #e0e0e0; border-radius: 10px;
  background: #fff; font-size: 12px; font-weight: 500; cursor: pointer;
  font-family: inherit; color: #c0392b;
}
.logout-btn:hover { background: #fdf0f0; }
</style>
</head>
<body>

<div class="topbar">
  <button class="topbar-back" onclick="window.location.href='/'">← Mappa</button>
  <img src="https://github.com/panacea-cloud/-ilqui-assets/blob/main/ilqui_logo.png?raw=true" class="topbar-logo" alt="QUI"/>
  <div style="width:60px"></div>
</div>

<div class="page">

  <!-- HERO -->
  <div class="hero" id="hero">
    <div class="spinner"></div>
  </div>

  <!-- PROFILO -->
  <div class="card">
    <div class="card-header">🏢 Profilo aziendale</div>
    <div class="card-body">
      <div class="field"><label>Nome visualizzato</label><input type="text" id="mp-display-name" placeholder="Nome che appare sulla mappa"/></div>
      <div class="field"><label>Ragione sociale</label><input type="text" id="mp-company-name" placeholder="Nome legale dell'azienda"/></div>
      <div class="field"><label>P.IVA</label><input type="text" id="mp-vat" placeholder="IT12345678901"/></div>
      <button class="save-btn" id="save-btn" onclick="saveProfile()">Salva</button>
    </div>
  </div>

  <!-- DOCUMENTI -->
  <div class="card">
    <div class="card-header">📄 Documenti legali</div>
    <div class="card-body" id="docs-body">
      <div class="spinner"></div>
    </div>
  </div>

  <!-- ANNUNCI -->
  <div class="card">
    <div class="card-header">📋 I miei annunci</div>
    <div class="card-body" id="listings-body">
      <div class="spinner"></div>
    </div>
  </div>

  <!-- API KEYS -->
  <div class="card">
    <div class="card-header">🔑 API Keys</div>
    <div class="card-body" id="apikeys-body">
      <div class="spinner"></div>
    </div>
  </div>
  
  <button class="logout-btn" onclick="doLogout()">Esci dall'account</button>

</div>

<input type="file" id="photo-input" accept="image/*" style="display:none" onchange="uploadPhoto(this)"/>

<script>
const API = 'https://qui-backend-production.up.railway.app';
const CLOUDINARY_CLOUD_NAME = 'zcjxbsss';
const CLOUDINARY_UPLOAD_PRESET = 'qui_uploads';

let authToken = localStorage.getItem('qui_token');
let authUser = null;

function authHeaders() {
  return { 'Content-Type': 'application/json', 'Authorization': `Bearer ${authToken}` };
}

function esc(s) {
  if (s == null) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}

function expiresLabel(iso) {
  if (!iso) return 'Permanente';
  const diff = (new Date(iso) - Date.now()) / 1000;
  if (diff <= 0) return 'Scaduto';
  if (diff < 86400) return `Scade tra ${Math.round(diff/3600)}h`;
  return `Scade tra ${Math.round(diff/86400)}g`;
}

async function uploadToCloudinary(file) {
  const fd = new FormData();
  fd.append('file', file);
  fd.append('upload_preset', CLOUDINARY_UPLOAD_PRESET);
  fd.append('folder', 'qui');
  const r = await fetch(`https://api.cloudinary.com/v1_1/${CLOUDINARY_CLOUD_NAME}/image/upload`, { method: 'POST', body: fd });
  if (!r.ok) throw new Error('Errore upload foto');
  return (await r.json()).secure_url;
}

// ── INIT ──
async function init() {
  if (!authToken) { window.location.href = '/'; return; }
  try {
    const r = await fetch(`${API}/auth/me`, { headers: authHeaders() });
    if (!r.ok) { window.location.href = '/'; return; }
    authUser = await r.json();
    if (authUser.tier !== 'enterprise') { window.location.href = '/'; return; }
  } catch { window.location.href = '/'; return; }
  renderHero();
  renderDocs();
  renderListings();
  renderApiKeys();
}

// ── HERO ──
function renderHero() {
  const u = authUser;
  const photo = u.business_photo
    ? `<img class="hero-photo" src="${esc(u.business_photo)}" onclick="document.getElementById('photo-input').click()" title="Cambia foto"/>`
    : `<div class="hero-photo-placeholder" onclick="document.getElementById('photo-input').click()" title="Aggiungi foto">🏢</div>`;
  document.getElementById('hero').innerHTML = `
    ${photo}
    <div class="hero-info">
      <div class="hero-name">${esc(u.display_name || u.company_name || 'Enterprise')}</div>
      <div class="hero-email">${esc(u.email)}</div>
      <div class="hero-badge">Enterprise</div>
    </div>`;
  document.getElementById('mp-display-name').value = u.display_name || '';
  document.getElementById('mp-company-name').value = u.company_name || '';
  document.getElementById('mp-vat').value = u.vat_number || '';
}

async function uploadPhoto(input) {
  const file = input.files[0];
  if (!file) return;
  try {
    const url = await uploadToCloudinary(file);
    const r = await fetch(`${API}/auth/profile`, {
      method: 'PUT', headers: authHeaders(),
      body: JSON.stringify({ business_photo: url })
    });
    if (!r.ok) throw new Error('Errore salvataggio');
    authUser = await r.json();
    renderHero();
  } catch(e) { alert('Errore: ' + e.message); }
}

// ── SALVA PROFILO ──
async function saveProfile() {
  const btn = document.getElementById('save-btn');
  btn.disabled = true; btn.textContent = 'Salvataggio…';
  try {
    const r = await fetch(`${API}/auth/profile`, {
      method: 'PUT', headers: authHeaders(),
      body: JSON.stringify({
        display_name: document.getElementById('mp-display-name').value.trim(),
        company_name: document.getElementById('mp-company-name').value.trim(),
        vat_number: document.getElementById('mp-vat').value.trim(),
      })
    });
    if (!r.ok) throw new Error('Errore salvataggio');
    authUser = await r.json();
    renderHero();
    btn.textContent = '✓ Salvato';
    setTimeout(() => { btn.disabled = false; btn.textContent = 'Salva'; }, 1800);
  } catch(e) {
    alert('Errore: ' + e.message);
    btn.disabled = false; btn.textContent = 'Salva';
  }
}

// ── DOCUMENTI KYB ──
function renderDocs() {
  const u = authUser;
  const body = document.getElementById('docs-body');
  let html = '';
  if (u.kyb_status === 'verified') {
    html += `<div class="verified-badge">✅ KYB verificato da QUI</div>`;
  } else if (u.kyb_status === 'pending') {
    html += `<div style="font-size:12px;color:#e07030;line-height:1.5;background:#fff8e1;border-radius:8px;padding:10px 12px">⏳ Documento inviato — verifica in corso (entro 48h).</div>`;
  } else {
    html += `<div style="font-size:12px;color:#888;line-height:1.5">Carica il documento KYB per la verifica Enterprise. Il team QUI lo verificherà entro 48h.</div>`;
  }
  const hasDoc = !!u.kyb_document_ref;
  html += `<div class="doc-row">
    <div class="doc-label">Documento KYB</div>
    <span class="doc-status ${hasDoc ? 'uploaded' : ''}" id="doc-kyb-status">${hasDoc ? '✓ Caricato' : 'Non caricato'}</span>
    <button class="doc-btn" onclick="document.getElementById('doc-kyb-input').click()">Carica</button>
    <input type="file" id="doc-kyb-input" accept="image/*,application/pdf" style="display:none" onchange="uploadKybDoc(this)"/>
  </div>`;
  html += `</div>`;
    body.innerHTML = html;
}

async function uploadKybDoc(input) {
  const file = input.files[0];
  if (!file) return;
  const statusEl = document.getElementById('doc-kyb-status');
  if (statusEl) { statusEl.textContent = 'Caricamento…'; statusEl.className = 'doc-status'; }
  try {
    const url = await uploadToCloudinary(file);
    const r = await fetch(`${API}/auth/profile`, {
      method: 'PUT', headers: authHeaders(),
      body: JSON.stringify({ kyb_document_ref: url })
    });
    if (!r.ok) throw new Error('Errore salvataggio');
    authUser = await r.json();
    if (statusEl) { statusEl.textContent = '✓ Caricato'; statusEl.className = 'doc-status uploaded'; }
  } catch(e) {
    alert('Errore upload: ' + e.message);
    if (statusEl) { statusEl.textContent = 'Errore'; statusEl.className = 'doc-status'; }
  }
}

// ── ANNUNCI ──
async function renderListings() {
  const body = document.getElementById('listings-body');
  try {
    const r = await fetch(`${API}/auth/my-listings`, { headers: authHeaders() });
    if (!r.ok) throw new Error();
    const listings = await r.json();
    if (!listings.length) { body.innerHTML = `<div class="empty">Nessun annuncio pubblicato.</div>`; return; }
    body.innerHTML = listings.map(l => {
      const isExpired = l.expires_at && new Date(l.expires_at) < new Date();
      const republishBtn = isExpired ? '<button class="delete-btn" style="background:#fff8e1;color:#e07030;border-color:#ffe082" onclick="republishListing(\'' + l.id + '\')">Ripubblica</button>' : '';
      return '<div class="listing-card" id="lcard-' + l.id + '">'
        + '<div class="listing-card-info">'
        + '<div class="listing-card-title">' + esc(l.title) + '</div>'
        + '<div class="listing-card-meta">' + esc(l.category || l.type) + ' · ' + (l.price === 0 ? 'Gratis' : '\u20AC' + l.price) + '</div>'
        + '<div class="listing-card-expires">' + expiresLabel(l.expires_at) + '</div>'
        + '</div>'
        + republishBtn
        + '<button class="delete-btn" onclick="deleteListing(\'' + l.id + '\')">Elimina</button>'
        + '</div>';
    }).join('');
  } catch { body.innerHTML = `<div class="empty">Errore caricamento annunci.</div>`; }
}

async function deleteListing(id) {
  if (!confirm('Eliminare questo annuncio?')) return;
  try {
    const r = await fetch(`${API}/listings/${id}`, { method: 'DELETE', headers: authHeaders() });
    if (!r.ok) throw new Error(`HTTP ${r.status}`);
    document.getElementById(`lcard-${id}`)?.remove();
  } catch(e) { alert(`Errore: ${e.message}`); }
}

async function republishListing(id) {
  try {
    const r = await fetch(`${API}/listings/${id}/republish`, {
      method: 'POST', headers: authHeaders()
    });
    if (!r.ok) throw new Error(`HTTP ${r.status}`);
    renderListings();
  } catch(e) { alert(`Errore: ${e.message}`); }
}

// ── LOGOUT ──
function doLogout() {
  localStorage.removeItem('qui_token');
  window.location.href = '/';
}

// ── API KEYS ──
async function renderApiKeys() {
  const body = document.getElementById('apikeys-body');
  try {
    const r = await fetch(`${API}/auth/api-keys`, { headers: authHeaders() });
    if (!r.ok) throw new Error();
    const keys = await r.json();

    let html = '';

    // Form crea nuova chiave
    html += `<div class="apikey-new-box">
      <div style="font-size:11px;font-weight:600;color:#2a2a6e">Genera nuova chiave</div>
      <input type="text" id="new-key-name" placeholder="Nome chiave (es. Gestionale, Zapier…)" maxlength="80"/>
      <button class="save-btn" onclick="createApiKey()" style="align-self:flex-start;padding:8px 14px;font-size:11px">Genera →</button>
    </div>`;

    // Chiave appena creata (mostrata una volta)
    html += `<div id="new-key-reveal" style="display:none"></div>`;
    html += `<div id="apikeys-list">`;
    
    // Lista chiavi esistenti
    if (!keys.length) {
      html += `<div class="empty">Nessuna chiave API. Generane una sopra.</div>`;
    } else {
      html += keys.map(k => {
        const active = !k.revoked && k.is_active;
        const lastUsed = k.last_used_at
          ? `Usata ${timeAgo(k.last_used_at)}`
          : 'Mai usata';
        return `<div class="apikey-row" id="akrow-${k.id}">
          <div style="flex:1;min-width:0">
            <div class="apikey-prefix">${esc(k.key_prefix)}</div>
            <div class="apikey-meta">${esc(k.name)} · ${lastUsed}</div>
            ${!active ? '<div style="font-size:10px;color:#c0392b;font-weight:600">REVOCATA</div>' : ''}
          </div>
          ${active ? `<button class="apikey-revoke-btn" onclick="revokeApiKey('${k.id}')">Revoca</button>` : ''}
        </div>`;
      }).join('');
    }

    body.innerHTML = html;
  } catch {
    document.getElementById('apikeys-body').innerHTML = `<div class="empty">Errore caricamento chiavi.</div>`;
  }
}

async function createApiKey() {
  const name = document.getElementById('new-key-name').value.trim() || 'Chiave API';
  try {
    const r = await fetch(`${API}/auth/api-keys`, {
      method: 'POST', headers: authHeaders(),
      body: JSON.stringify({ name })
    });
    if (!r.ok) throw new Error('Errore creazione');
    const d = await r.json();
    // Mostra la chiave una sola volta
    const revealEl = document.getElementById('new-key-reveal');
    revealEl.style.display = 'block';
    revealEl.innerHTML = `<div class="apikey-secret-box">
      <div class="apikey-warning">⚠️ Copia questa chiave ora — non sarà più mostrata</div>
      <div class="apikey-secret-value">${esc(d.key)}</div>
      <button class="save-btn" style="align-self:flex-start;padding:6px 12px;font-size:11px" onclick="copyApiKey('${esc(d.key)}', this)">Copia</button>
    </div>`;
    // Ricarica lista mantenendo il reveal
    try {
      const r2 = await fetch(`${API}/auth/api-keys`, { headers: authHeaders() });
      if (r2.ok) {
        const keys = await r2.json();
        const body = document.getElementById('apikeys-body');
        // Aggiorna solo la lista, non il reveal
        const listEl = document.getElementById('apikeys-list');
        if (listEl) {
          listEl.innerHTML = keys.map(k => {
            const active = !k.revoked && k.is_active;
            const lastUsed = k.last_used_at ? `Usata ${timeAgo(k.last_used_at)}` : 'Mai usata';
            return `<div class="apikey-row" id="akrow-${k.id}">
              <div style="flex:1;min-width:0">
                <div class="apikey-prefix">${esc(k.key_prefix)}</div>
                <div class="apikey-meta">${esc(k.name)} · ${lastUsed}</div>
                ${!active ? '<div style="font-size:10px;color:#c0392b;font-weight:600">REVOCATA</div>' : ''}
              </div>
              ${active ? `<button class="apikey-revoke-btn" onclick="revokeApiKey('${k.id}')">Revoca</button>` : ''}
            </div>`;
          }).join('');
        }
      }
    } catch {}
  } catch(e) { alert('Errore: ' + e.message); }
}

function copyApiKey(key, btn) {
  navigator.clipboard.writeText(key).then(() => {
    btn.textContent = '✓ Copiata';
    setTimeout(() => { btn.textContent = 'Copia'; }, 2000);
  });
}

async function revokeApiKey(keyId) {
  if (!confirm('Revocare questa chiave? L\'operazione è irreversibile.')) return;
  try {
    const r = await fetch(`${API}/auth/api-keys/${keyId}`, {
      method: 'DELETE', headers: authHeaders()
    });
    if (!r.ok) throw new Error();
    document.getElementById(`akrow-${keyId}`)?.remove();
  } catch { alert('Errore revoca chiave.'); }
}

function timeAgo(iso) {
  const diff = (Date.now() - new Date(iso)) / 1000;
  if (diff < 3600)  return `${Math.round(diff/60)}min fa`;
  if (diff < 86400) return `${Math.round(diff/3600)}h fa`;
  return `${Math.round(diff/86400)}g fa`;
}
