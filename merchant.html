<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>QUI — Profilo Merchant</title>
<link rel="icon" type="image/png" href="https://github.com/panacea-cloud/-ilqui-assets/blob/main/ilqui_logo.png?raw=true"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet"/>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { font-family: 'Inter', sans-serif; font-size: 13px; color: #111; background: #fff; min-height: 100%; }
button { font-family: inherit; }

.topbar {
  height: 44px; border-bottom: 0.5px solid rgba(42,42,110,0.18);
  display: grid; grid-template-columns: 1fr auto 1fr;
  align-items: center; padding: 0 14px;
  flex-shrink: 0; background: #fff; z-index: 300; position: sticky; top: 0;
}
.topbar-logo { width: 26px; height: 26px; object-fit: contain; }
.topbar-back {
  font-size: 12px; font-weight: 600; color: #2a2a6e; cursor: pointer;
  background: none; border: none; display: flex; align-items: center; gap: 4px;
}
.topbar-back:hover { opacity: 0.7; }
.topbar-right { display: flex; align-items: center; justify-content: flex-end; position: relative; }

.avatar-btn {
  width: 30px; height: 30px; border-radius: 50%; border: none; background: #2a2a6e;
  cursor: pointer; display: flex; align-items: center; justify-content: center;
  flex-shrink: 0; overflow: hidden; padding: 0;
}
.avatar-btn img { width: 100%; height: 100%; object-fit: cover; }
.avatar-btn svg { width: 15px; height: 15px; }

.avatar-menu {
  display: none; position: absolute; top: 40px; right: 0; z-index: 400;
  background: #fff; border: 0.5px solid #e0e0e0; border-radius: 12px;
  box-shadow: 0 6px 24px rgba(0,0,0,0.12); padding: 6px; width: 168px;
}
.avatar-menu.open { display: block; }
.avatar-menu-item {
  display: flex; align-items: center; gap: 9px; padding: 8px 10px;
  border-radius: 8px; font-size: 12.5px; font-weight: 500; color: #333;
  cursor: pointer; border: none; background: none; text-align: left; width: 100%;
}
.avatar-menu-item:hover { background: #f0f0f3; }
.avatar-menu-item.danger { color: #c0392b; }
.avatar-menu-item svg { width: 15px; height: 15px; flex-shrink: 0; }
.avatar-menu-divider { height: 0.5px; background: #e0e0e0; margin: 4px 6px; }

.content { max-width: 1100px; margin: 0 auto; padding: 24px 20px 60px; }
.section { display: none; flex-direction: column; gap: 18px; }
.section.active { display: flex; }
.section-title { font-size: 15px; font-weight: 600; color: #111; }

.tier-badge {
  display: inline-flex; align-items: center; gap: 5px; font-size: 10.5px; font-weight: 600;
  padding: 3px 9px; border-radius: 10px; width: fit-content;
}
.tier-badge.regular { background: #eeeefe; color: #2a2a6e; }
.tier-badge.enterprise { background: #fbeaf0; color: #4b1528; }

.card { background: #fff; border-radius: 14px; overflow: hidden; border: 0.5px solid #e8e8e8; }
.card-body { padding: 18px 20px; display: flex; flex-direction: column; gap: 14px; }

.hero-row { display: flex; align-items: center; gap: 16px; }
.hero-photo {
  width: 60px; height: 60px; border-radius: 50%; object-fit: cover;
  border: 0.5px solid #e0e0e0; flex-shrink: 0; cursor: pointer;
}
.hero-photo-placeholder {
  width: 60px; height: 60px; border-radius: 50%; background: #2a2a6e;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0; cursor: pointer; border: 2px dashed rgba(42,42,110,0.4);
}
.hero-photo-placeholder svg { width: 26px; height: 26px; }
.hero-meta-label { font-size: 10px; color: #999; }

.field { display: flex; flex-direction: column; gap: 5px; }
.field label { font-size: 10px; font-weight: 600; color: #888; letter-spacing: .04em; text-transform: uppercase; }
.field input, .field textarea {
  border: 1px solid #e0e0e0; border-radius: 8px; padding: 9px 11px;
  font-size: 13px; font-family: inherit; color: #111; outline: none;
  background: #fafafa; width: 100%; transition: border-color .15s;
}
.field input:focus, .field textarea:focus { border-color: #2a2a6e; background: #fff; }

.save-btn {
  padding: 10px 18px; background: #2a2a6e; color: #fff; border: none;
  border-radius: 8px; font-size: 12px; font-weight: 600; cursor: pointer; align-self: flex-end;
}
.save-btn:hover { opacity: .88; }
.save-btn:disabled { opacity: .45; cursor: not-allowed; }

.divider-label {
  font-size: 11px; font-weight: 700; color: #2a2a6e; text-transform: uppercase;
  letter-spacing: .05em; padding-top: 6px; border-top: 0.5px solid #f0f0f0;
}
.divider-hint { font-size: 11.5px; color: #999; line-height: 1.5; margin-top: -6px; }
.doc-row {
  display: flex; align-items: center; justify-content: space-between;
  padding: 10px 12px; border: 0.5px solid #e0e0e0; border-radius: 8px; gap: 8px;
}
.doc-label { font-size: 12px; color: #555; font-weight: 500; flex: 1; }
.doc-status { font-size: 11px; color: #aaa; }
.doc-status.uploaded { color: #2a7a4a; font-weight: 600; }
.doc-btn {
  font-size: 11px; background: #f0f0fa; color: #2a2a6e; border: 0.5px solid #c0c0e0;
  border-radius: 6px; padding: 5px 10px; cursor: pointer; font-weight: 500; white-space: nowrap;
}
.doc-btn:hover { background: #e0e0f5; }
.verified-badge {
  display: flex; align-items: center; gap: 6px; padding: 10px 12px;
  background: #ddf3ea; border-radius: 8px; font-size: 12px; color: #2a7a4a; font-weight: 600;
}
.pending-badge {
  font-size: 12px; color: #e07030; line-height: 1.5; background: #fff8e1;
  border-radius: 8px; padding: 10px 12px;
}

.listing-category { display: flex; flex-direction: column; gap: 10px; }
.listing-category-label { font-size: 11px; font-weight: 700; color: #2a2a6e; text-transform: uppercase; letter-spacing: .05em; }
.listing-grid {
  display: grid; grid-template-columns: repeat(8, 1fr); gap: 10px;
}
@media (max-width: 1000px) { .listing-grid { grid-template-columns: repeat(5, 1fr); } }
@media (max-width: 680px) { .listing-grid { grid-template-columns: repeat(3, 1fr); } }

.listing-tile {
  position: relative; aspect-ratio: 3/4; border-radius: 10px; overflow: hidden;
  background: #1a1a2e; border: 0.5px solid #e8e8e8;
}
.listing-tile img { width: 100%; height: 100%; object-fit: cover; display: block; }
.listing-tile-noimg { width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; font-size: 22px; color: #555; }
.listing-tile-overlay {
  position: absolute; bottom: 0; left: 0; right: 0;
  background: linear-gradient(to top, rgba(0,0,0,0.82) 0%, transparent 100%);
  padding: 16px 8px 8px; display: flex; flex-direction: column; gap: 2px;
}
.listing-tile-title { font-size: 10.5px; font-weight: 600; color: #fff; line-height: 1.3; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.listing-tile-price { font-size: 10px; color: rgba(255,255,255,0.8); }
.listing-tile-expired { position: absolute; top: 6px; right: 6px; background: #e07030; color: #fff; font-size: 8.5px; font-weight: 600; padding: 2px 6px; border-radius: 10px; }
.listing-tile-actions { position: absolute; top: 6px; left: 6px; display: flex; gap: 4px; }
.tile-action-btn {
  width: 22px; height: 22px; border-radius: 50%; border: none; background: rgba(255,255,255,0.9);
  cursor: pointer; display: flex; align-items: center; justify-content: center; padding: 0;
}
.tile-action-btn svg { width: 12px; height: 12px; }
.tile-action-btn.danger svg { color: #c0392b; }

.empty-state {
  display: flex; flex-direction: column; align-items: center; text-align: center;
  padding: 40px 16px; gap: 10px;
}
.empty-state-icon { font-size: 28px; opacity: .5; }
.empty-state-text { font-size: 12.5px; color: #999; line-height: 1.5; max-width: 260px; }
.empty-state-cta {
  margin-top: 4px; padding: 8px 16px; background: #2a2a6e; color: #fff; border: none;
  border-radius: 8px; font-size: 11.5px; font-weight: 600; cursor: pointer;
}
.empty-state-cta:hover { opacity: .88; }

.spinner { width: 20px; height: 20px; border: 2px solid #eee; border-top-color: #2a2a6e; border-radius: 50%; animation: spin .7s linear infinite; margin: 0 auto; }
@keyframes spin { to { transform: rotate(360deg); } }

.apikey-row {
  display: flex; align-items: center; justify-content: space-between;
  padding: 10px 12px; border: 0.5px solid #e0e0e0; border-radius: 8px; gap: 8px;
}
.apikey-prefix { font-size: 12px; font-weight: 600; color: #111; font-family: monospace; }
.apikey-meta { font-size: 11px; color: #888; margin-top: 2px; }
.apikey-revoke-btn {
  font-size: 11px; color: #c0392b; background: #fdf0f0; border: 0.5px solid #f5c0b8;
  border-radius: 6px; padding: 5px 10px; cursor: pointer; font-weight: 500; white-space: nowrap; flex-shrink: 0;
}
.apikey-revoke-btn:hover { background: #fbe0e0; }
.apikey-new-box {
  background: #f0f2ff; border: 1px solid #c0c0e0; border-radius: 10px;
  padding: 14px; display: flex; flex-direction: column; gap: 10px;
}
.apikey-new-box input {
  border: 1px solid #c0c0e0; border-radius: 8px; padding: 8px 10px;
  font-size: 12px; font-family: inherit; color: #111; outline: none; background: #fff; width: 100%;
}
.apikey-new-box input:focus { border-color: #2a2a6e; }
.apikey-secret-box {
  background: #fff8e1; border: 1px solid #ffe082; border-radius: 8px;
  padding: 12px; display: flex; flex-direction: column; gap: 8px;
}
.apikey-secret-value { font-family: monospace; font-size: 11px; color: #111; word-break: break-all; line-height: 1.5; }
.apikey-warning { font-size: 11px; color: #e07030; font-weight: 600; }
.apikey-secret-actions { display: flex; gap: 8px; }
.apikey-dismiss-btn {
  padding: 6px 12px; background: none; color: #888; border: 1px solid #ddd;
  border-radius: 6px; font-size: 11px; font-weight: 500; cursor: pointer;
}
.apikey-dismiss-btn:hover { background: #f5f5f5; }

.upgrade-box {
  background: #f0f2ff; border: 1px solid #c0c0e0; border-radius: 10px;
  padding: 14px; display: flex; flex-direction: column; gap: 6px;
}
.upgrade-box-title { font-size: 12px; font-weight: 700; color: #2a2a6e; }
.upgrade-box-text { font-size: 11.5px; color: #666; line-height: 1.5; }

.confirm-overlay {
  display: none; position: fixed; inset: 0; background: rgba(10,10,30,0.45);
  z-index: 5000; align-items: center; justify-content: center; padding: 16px;
}
.confirm-overlay.open { display: flex; }
.confirm-modal {
  background: #fff; border-radius: 14px; width: 100%; max-width: 340px;
  padding: 22px 22px 18px; box-shadow: 0 8px 40px rgba(0,0,0,0.2);
}
.confirm-title { font-size: 14px; font-weight: 700; color: #111; margin-bottom: 6px; }
.confirm-body { font-size: 12.5px; color: #666; line-height: 1.5; margin-bottom: 18px; }
.confirm-actions { display: flex; gap: 8px; }
.confirm-cancel {
  flex: 1; padding: 9px; border: 1px solid #e0e0e0; border-radius: 8px; background: #fff;
  font-size: 12px; font-weight: 500; cursor: pointer; color: #555;
}
.confirm-cancel:hover { background: #f5f5f5; }
.confirm-danger {
  flex: 1; padding: 9px; border: none; border-radius: 8px; background: #c0392b;
  color: #fff; font-size: 12px; font-weight: 600; cursor: pointer;
}
.confirm-danger:hover { opacity: .88; }
</style>
</head>
<body>

<div class="topbar">
  <button class="topbar-back" onclick="window.location.href='/'">← Mappa</button>
  <img src="https://github.com/panacea-cloud/-ilqui-assets/blob/main/ilqui_logo.png?raw=true" class="topbar-logo" alt="QUI" style="cursor:pointer" title="Pubblica un annuncio" onclick="window.location.href='/?openAdd=1'"/>
  <div class="topbar-right">
    <button class="avatar-btn" id="avatar-btn" onclick="toggleAvatarMenu()">
      <svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="1.8"><path d="M3 21h18M6 21V9l6-4 6 4v12M10 21v-6h4v6"/></svg>
    </button>
    <div class="avatar-menu" id="avatar-menu">
      <button class="avatar-menu-item" data-target="sec-profile">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
        Profilo
      </button>
      <button class="avatar-menu-item" data-target="sec-listings">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg>
        Annunci
      </button>
      <button class="avatar-menu-item" data-target="sec-apikeys" id="menu-apikeys">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="7.5" cy="15.5" r="5.5"/><path d="M21 2l-9.6 9.6"/><path d="M15.5 7.5L19 4l3 3-4 3.5"/></svg>
        API Keys
      </button>
      <div class="avatar-menu-divider"></div>
      <button class="avatar-menu-item danger" onclick="doLogout()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><path d="M16 17l5-5-5-5"/><path d="M21 12H9"/></svg>
        Esci
      </button>
    </div>
  </div>
</div>

<div class="content">

  <div class="section active" id="sec-profile">
    <div class="section-title">Profilo</div>
    <div class="card">
      <div class="card-body">
        <div class="hero-row">
          <img class="hero-photo" id="hero-photo-img" style="display:none" onclick="document.getElementById('photo-input').click()"/>
          <div class="hero-photo-placeholder" id="hero-photo-placeholder" onclick="document.getElementById('photo-input').click()" title="Aggiungi foto">
            <svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="1.8"><path d="M3 21h18M6 21V9l6-4 6 4v12M10 21v-6h4v6"/></svg>
          </div>
          <div style="display:flex;flex-direction:column;gap:4px">
            <span class="tier-badge" id="tier-badge"></span>
            <div class="hero-meta-label" id="hero-email"></div>
          </div>
        </div>

        <div class="field"><label>Nome visualizzato</label><input type="text" id="mp-display-name" placeholder="Nome che appare sulla mappa"/></div>
        <div class="field"><label>Ragione sociale</label><input type="text" id="mp-company-name" placeholder="Nome legale dell'azienda"/></div>
        <div class="field"><label>P.IVA</label><input type="text" id="mp-vat" placeholder="IT12345678901"/></div>
        <button class="save-btn" id="save-btn" onclick="saveProfile()">Salva</button>

        <div class="divider-label">Documenti legali</div>
        <div class="divider-hint" id="docs-hint" style="display:none"></div>
        <div id="docs-body"><div class="spinner"></div></div>
      </div>
    </div>
  </div>

  <div class="section" id="sec-listings">
    <div class="section-title">Annunci</div>
    <div id="listings-body"><div class="spinner"></div></div>
  </div>

  <div class="section" id="sec-apikeys">
    <div class="section-title">API Keys</div>
    <div class="card">
      <div class="card-body" id="apikeys-body"><div class="spinner"></div></div>
    </div>
  </div>

</div>

<input type="file" id="photo-input" accept="image/*" style="display:none" onchange="uploadPhoto(this)"/>

<div class="confirm-overlay" id="confirm-overlay">
  <div class="confirm-modal">
    <div class="confirm-title" id="confirm-title">Conferma</div>
    <div class="confirm-body" id="confirm-body"></div>
    <div class="confirm-actions">
      <button class="confirm-cancel" onclick="closeConfirm()">Annulla</button>
      <button class="confirm-danger" id="confirm-danger-btn">Conferma</button>
    </div>
  </div>
</div>

<script>
const API = 'https://qui-backend-production.up.railway.app';
const CLOUDINARY_CLOUD_NAME = 'zcjxbsss';
const CLOUDINARY_UPLOAD_PRESET = 'qui_uploads';

let authToken = localStorage.getItem('qui_token');
let authUser = null;
let isEnterprise = false;
let myListingsCache = [];

function authHeaders() {
  return { 'Content-Type': 'application/json', 'Authorization': `Bearer ${authToken}` };
}
function esc(s) {
  if (s == null) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}
function expiresLabel(iso) {
  if (!iso) return null;
  const diff = (new Date(iso) - Date.now()) / 1000;
  if (diff <= 0) return 'Scaduto';
  if (diff < 86400) return `Scade tra ${Math.round(diff/3600)}h`;
  return `Scade tra ${Math.round(diff/86400)}g`;
}
function timeAgo(iso) {
  const diff = (Date.now() - new Date(iso)) / 1000;
  if (diff < 3600)  return `${Math.round(diff/60)}min fa`;
  if (diff < 86400) return `${Math.round(diff/3600)}h fa`;
  return `${Math.round(diff/86400)}g fa`;
}
async function uploadToCloudinary(file) {
  const fd = new FormData();
  fd.append('file', file);
  fd.append('upload_preset', CLOUDINARY_UPLOAD_PRESET);
  fd.append('folder', 'qui');
  const r = await fetch(`https://api.cloudinary.com/v1_1/${CLOUDINARY_CLOUD_NAME}/image/upload`, { method: 'POST', body: fd });
  if (!r.ok) throw new Error('Errore upload foto');
  return (await r.json()).secure_url;
}

function toggleAvatarMenu() { document.getElementById('avatar-menu').classList.toggle('open'); }
document.addEventListener('click', e => {
  const menu = document.getElementById('avatar-menu');
  const btn = document.getElementById('avatar-btn');
  if (menu.classList.contains('open') && !menu.contains(e.target) && !btn.contains(e.target)) menu.classList.remove('open');
});
document.querySelectorAll('.avatar-menu-item[data-target]').forEach(el => {
  el.addEventListener('click', () => {
    document.querySelectorAll('.section').forEach(s => s.classList.toggle('active', s.id === el.dataset.target));
    document.getElementById('avatar-menu').classList.remove('open');
    window.scrollTo({ top: 0 });
  });
});

let confirmCallback = null;
function askConfirm(title, body, dangerLabel, onConfirm) {
  document.getElementById('confirm-title').textContent = title;
  document.getElementById('confirm-body').textContent = body;
  document.getElementById('confirm-danger-btn').textContent = dangerLabel;
  confirmCallback = onConfirm;
  document.getElementById('confirm-overlay').classList.add('open');
}
function closeConfirm() { document.getElementById('confirm-overlay').classList.remove('open'); confirmCallback = null; }
document.getElementById('confirm-danger-btn').addEventListener('click', () => { const cb = confirmCallback; closeConfirm(); if (cb) cb(); });
document.getElementById('confirm-overlay').addEventListener('click', function(e) { if (e.target === this) closeConfirm(); });

async function init() {
  if (!authToken) { window.location.href = '/'; return; }
  try {
    const r = await fetch(`${API}/auth/me`, { headers: authHeaders() });
    if (!r.ok) { window.location.href = '/'; return; }
    authUser = await r.json();
    if (!['regular', 'enterprise'].includes(authUser.tier)) { window.location.href = '/'; return; }
    isEnterprise = authUser.tier === 'enterprise';
  } catch { window.location.href = '/'; return; }

  // API Keys è solo Enterprise — nascondi la voce di menu e non caricare la sezione
  if (!isEnterprise) {
    document.getElementById('menu-apikeys').style.display = 'none';
  }

  renderAvatar();
  renderProfileFields();
  renderDocs();
  renderListings();
  if (isEnterprise) renderApiKeys();
}

function renderAvatar() {
  const u = authUser;
  const img = document.getElementById('hero-photo-img');
  const placeholder = document.getElementById('hero-photo-placeholder');
  if (u.business_photo) {
    img.src = u.business_photo; img.style.display = '';
    placeholder.style.display = 'none';
    document.getElementById('avatar-btn').innerHTML = `<img src="${esc(u.business_photo)}"/>`;
  } else {
    img.style.display = 'none'; placeholder.style.display = 'flex';
  }
  document.getElementById('hero-email').textContent = u.email;
  const badge = document.getElementById('tier-badge');
  badge.textContent = isEnterprise ? 'Enterprise' : 'Regular';
  badge.className = 'tier-badge ' + (isEnterprise ? 'enterprise' : 'regular');
}

async function uploadPhoto(input) {
  const file = input.files[0];
  if (!file) return;
  try {
    const url = await uploadToCloudinary(file);
    const r = await fetch(`${API}/auth/profile`, { method: 'PUT', headers: authHeaders(), body: JSON.stringify({ business_photo: url }) });
    if (!r.ok) throw new Error('Errore salvataggio');
    authUser = await r.json();
    renderAvatar();
  } catch(e) { alert('Errore: ' + e.message); }
}

function renderProfileFields() {
  document.getElementById('mp-display-name').value = authUser.display_name || '';
  document.getElementById('mp-company-name').value = authUser.company_name || '';
  document.getElementById('mp-vat').value = authUser.vat_number || '';
}

async function saveProfile() {
  const btn = document.getElementById('save-btn');
  btn.disabled = true; btn.textContent = 'Salvataggio…';
  try {
    const r = await fetch(`${API}/auth/profile`, {
      method: 'PUT', headers: authHeaders(),
      body: JSON.stringify({
        display_name: document.getElementById('mp-display-name').value.trim(),
        company_name: document.getElementById('mp-company-name').value.trim(),
        vat_number: document.getElementById('mp-vat').value.trim(),
      })
    });
    if (!r.ok) throw new Error('Errore salvataggio');
    authUser = await r.json();
    renderAvatar();
    btn.textContent = '✓ Salvato';
    setTimeout(() => { btn.disabled = false; btn.textContent = 'Salva'; }, 1800);
  } catch(e) {
    alert('Errore: ' + e.message);
    btn.disabled = false; btn.textContent = 'Salva';
  }
}

// Documenti legali:
// - Enterprise: mostra solo lo stato KYB (verificato / in verifica), nessun upload qui
//   (il documento è già stato verificato per diventare Enterprise).
// - Regular: upload = richiesta di promozione a Enterprise, via /auth/kyb-request
//   (mai più /auth/profile — quell'endpoint non aggiorna kyb_status).
function renderDocs() {
  const u = authUser;
  const body = document.getElementById('docs-body');
  const hint = document.getElementById('docs-hint');
  let html = '';

  if (u.kyb_status === 'verified') {
    html += `<div class="verified-badge">✓ KYB verificato da QUI</div>`;
    hint.style.display = 'none';
  } else if (u.kyb_status === 'pending') {
    html += `<div class="pending-badge">Documento inviato — verifica in corso (entro 48h).</div>`;
    hint.style.display = 'none';
  } else if (isEnterprise) {
    html += `<div style="font-size:12px;color:#888;line-height:1.5">Nessun documento KYB registrato.</div>`;
    hint.style.display = 'none';
  } else {
    hint.textContent = 'Carica un documento per richiedere la promozione a Enterprise: sblocca coordinate esatte, API Keys e verifica pubblica.';
    hint.style.display = 'block';
  }

  if (!isEnterprise && u.kyb_status !== 'verified' && u.kyb_status !== 'pending') {
    const hasDoc = !!u.kyb_document_ref;
    html += `<div class="doc-row">
      <div class="doc-label">Documento KYB</div>
      <span class="doc-status ${hasDoc ? 'uploaded' : ''}" id="doc-kyb-status">${hasDoc ? '✓ Caricato' : 'Non caricato'}</span>
      <button class="doc-btn" onclick="document.getElementById('doc-kyb-input').click()">Carica</button>
      <input type="file" id="doc-kyb-input" accept="image/*,application/pdf" style="display:none" onchange="uploadKybDoc(this)"/>
    </div>`;
  }

  body.innerHTML = html;
}

async function uploadKybDoc(input) {
  const file = input.files[0];
  if (!file) return;
  const statusEl = document.getElementById('doc-kyb-status');
  if (statusEl) { statusEl.textContent = 'Caricamento…'; statusEl.className = 'doc-status'; }
  try {
    const url = await uploadToCloudinary(file);
    // Corretto: /auth/kyb-request (non /auth/profile) — imposta anche kyb_status='pending'
    // così la richiesta compare nella coda di moderazione admin.
    const r = await fetch(`${API}/auth/kyb-request`, { method: 'PUT', headers: authHeaders(), body: JSON.stringify({ kyb_document_ref: url }) });
    if (!r.ok) throw new Error('Errore invio richiesta');
    authUser = await r.json();
    renderDocs();
  } catch(e) {
    alert('Errore upload: ' + e.message);
    if (statusEl) { statusEl.textContent = 'Errore'; statusEl.className = 'doc-status'; }
  }
}

function listingTileHTML(l) {
  const exp = expiresLabel(l.expires_at);
  const price = l.price === 0 ? 'Gratis' : (l.price != null ? `€${l.price}` : '');
  const img = (l.photos && l.photos[0])
    ? `<img src="${esc(l.photos[0])}" alt="${esc(l.title)}"/>`
    : `<div class="listing-tile-noimg">📦</div>`;
  return `<div class="listing-tile" id="ltile-${l.id}">
    ${img}
    ${exp === 'Scaduto' ? `<div class="listing-tile-expired">Scaduto</div>` : ''}
    <div class="listing-tile-actions">
      <button class="tile-action-btn danger" title="Elimina" onclick="confirmDeleteListing('${l.id}', '${esc(l.title).replace(/'/g,"\\'")}')">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 6h18M8 6V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2m3 0v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6"/></svg>
      </button>
    </div>
    <div class="listing-tile-overlay">
      <div class="listing-tile-title">${esc(l.title)}</div>
      <div class="listing-tile-price">${esc(price)}</div>
    </div>
  </div>`;
}

function categoryLabel(type) {
  if (type === 'product') return 'Prodotti';
  if (type === 'service') return 'Servizi';
  if (type === 'experience') return 'Esperienze';
  return 'Altro';
}
function typeFromEntity(l) {
  const tags = l.tags || [];
  if (tags.includes('product')) return 'product';
  if (tags.includes('service')) return 'service';
  if (tags.includes('experience')) return 'experience';
  const t = l.type || '';
  if (['retail','product_digital'].includes(t)) return 'product';
  if (t.startsWith('service')) return 'service';
  if (t === 'experience') return 'experience';
  return 'product';
}

async function renderListings() {
  const body = document.getElementById('listings-body');
  try {
    const r = await fetch(`${API}/auth/my-listings`, { headers: authHeaders() });
    if (!r.ok) throw new Error();
    myListingsCache = await r.json();
    if (!myListingsCache.length) {
      body.innerHTML = `<div class="empty-state">
        <div class="empty-state-icon">📍</div>
        <div class="empty-state-text">Non hai ancora pubblicato nessun annuncio.</div>
        <button class="empty-state-cta" onclick="window.location.href='/'">Pubblica il primo annuncio</button>
      </div>`;
      return;
    }
    const groups = { product: [], service: [], experience: [] };
    myListingsCache.forEach(l => { groups[typeFromEntity(l)].push(l); });
    let html = '';
    ['product','service','experience'].forEach(type => {
      if (!groups[type].length) return;
      html += `<div class="listing-category">
        <div class="listing-category-label">${categoryLabel(type)}</div>
        <div class="listing-grid">${groups[type].map(listingTileHTML).join('')}</div>
      </div>`;
    });
    body.innerHTML = html;
  } catch { body.innerHTML = `<div class="empty-state"><div class="empty-state-text">Errore nel caricamento degli annunci.</div></div>`; }
}

function confirmDeleteListing(id, title) {
  askConfirm('Eliminare annuncio?', `"${title}" verrà rimosso definitivamente dalla mappa. L'operazione non è reversibile.`, 'Elimina', () => deleteListing(id));
}
async function deleteListing(id) {
  try {
    const r = await fetch(`${API}/listings/${id}`, { method: 'DELETE', headers: authHeaders() });
    if (!r.ok) throw new Error(`HTTP ${r.status}`);
    document.getElementById(`ltile-${id}`)?.remove();
    myListingsCache = myListingsCache.filter(l => String(l.id) !== String(id));
    if (!myListingsCache.length) renderListings();
  } catch(e) { alert(`Errore: ${e.message}`); }
}

function doLogout() {
  document.getElementById('avatar-menu').classList.remove('open');
  askConfirm('Uscire dall\'account?', 'Dovrai effettuare nuovamente l\'accesso per gestire i tuoi annunci.', 'Esci', () => {
    localStorage.removeItem('qui_token');
    window.location.href = '/';
  });
}

function apiKeyRowHTML(k) {
  const active = !k.revoked && k.is_active;
  const lastUsed = k.last_used_at ? `Usata ${timeAgo(k.last_used_at)}` : 'Mai usata';
  return `<div class="apikey-row" id="akrow-${k.id}">
    <div style="flex:1;min-width:0">
      <div class="apikey-prefix">${esc(k.key_prefix)}</div>
      <div class="apikey-meta">${esc(k.name)} · ${lastUsed}</div>
      ${!active ? '<div style="font-size:10px;color:#c0392b;font-weight:600">REVOCATA</div>' : ''}
    </div>
    ${active ? `<button class="apikey-revoke-btn" onclick="confirmRevokeApiKey('${k.id}', '${esc(k.name).replace(/'/g,"\\'")}')">Revoca</button>` : ''}
  </div>`;
}

async function renderApiKeys() {
  const body = document.getElementById('apikeys-body');
  try {
    const r = await fetch(`${API}/auth/api-keys`, { headers: authHeaders() });
    if (!r.ok) throw new Error();
    const keys = await r.json();
    let html = `<div class="apikey-new-box">
      <div style="font-size:11px;font-weight:600;color:#2a2a6e">Genera nuova chiave</div>
      <input type="text" id="new-key-name" placeholder="Nome chiave (es. Gestionale, Zapier…)" maxlength="80"/>
      <button class="save-btn" onclick="createApiKey()" style="align-self:flex-start;padding:8px 14px;font-size:11px">Genera →</button>
    </div>`;
    html += `<div id="new-key-reveal" style="display:none"></div>`;
    html += `<div id="apikeys-list">`;
    html += !keys.length
      ? `<div class="empty-state" style="padding:20px 8px"><div class="empty-state-text">Nessuna chiave API generata. Creane una sopra per integrare QUI nei tuoi sistemi.</div></div>`
      : keys.map(apiKeyRowHTML).join('');
    html += `</div>`;
    body.innerHTML = html;
  } catch {
    body.innerHTML = `<div class="empty-state"><div class="empty-state-text">Errore caricamento chiavi.</div></div>`;
  }
}

async function refreshApiKeyList() {
  try {
    const r = await fetch(`${API}/auth/api-keys`, { headers: authHeaders() });
    if (!r.ok) return;
    const keys = await r.json();
    const listEl = document.getElementById('apikeys-list');
    if (listEl) {
      listEl.innerHTML = keys.length
        ? keys.map(apiKeyRowHTML).join('')
        : `<div class="empty-state" style="padding:20px 8px"><div class="empty-state-text">Nessuna chiave API generata.</div></div>`;
    }
  } catch {}
}

async function createApiKey() {
  const name = document.getElementById('new-key-name').value.trim() || 'Chiave API';
  try {
    const r = await fetch(`${API}/auth/api-keys`, { method: 'POST', headers: authHeaders(), body: JSON.stringify({ name }) });
    if (!r.ok) throw new Error('Errore creazione');
    const d = await r.json();
    const revealEl = document.getElementById('new-key-reveal');
    revealEl.style.display = 'block';
    revealEl.innerHTML = `<div class="apikey-secret-box">
      <div class="apikey-warning">⚠️ Copia questa chiave ora — non sarà più mostrata</div>
      <div class="apikey-secret-value">${esc(d.key)}</div>
      <div class="apikey-secret-actions">
        <button class="save-btn" style="padding:6px 12px;font-size:11px" onclick="copyApiKey('${esc(d.key)}', this)">Copia</button>
        <button class="apikey-dismiss-btn" onclick="document.getElementById('new-key-reveal').style.display='none'; document.getElementById('new-key-reveal').innerHTML=''">Ho copiato, nascondi</button>
      </div>
    </div>`;
    document.getElementById('new-key-name').value = '';
    await refreshApiKeyList();
  } catch(e) { alert('Errore: ' + e.message); }
}

function copyApiKey(key, btn) {
  navigator.clipboard.writeText(key).then(() => {
    btn.textContent = '✓ Copiata';
    setTimeout(() => { btn.textContent = 'Copia'; }, 2000);
  });
}

function confirmRevokeApiKey(keyId, name) {
  askConfirm('Revocare chiave API?', `"${name}" smetterà di funzionare immediatamente. L'operazione è irreversibile.`, 'Revoca', () => revokeApiKey(keyId));
}
async function revokeApiKey(keyId) {
  try {
    const r = await fetch(`${API}/auth/api-keys/${keyId}`, { method: 'DELETE', headers: authHeaders() });
    if (!r.ok) throw new Error();
    document.getElementById(`akrow-${keyId}`)?.remove();
  } catch { alert('Errore revoca chiave.'); }
}

init();
</script>
</body>
</html>
